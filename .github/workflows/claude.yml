name: Claude Code Pipeline

# 三組 trigger 分清楚：
#   Trigger P — issue 被加上 agent:plan label 時，由 Claude 只做拆解規劃並建立 child issues
#   Trigger A — issue 被加上 agent:run label 時，由 Claude 處理 issue 並開 PR
#   Trigger B — PR review 提交時，若 reviewer 是 Codex bot 則由 Claude 修正
#
# NOTE: Codex bot login `chatgpt-codex-connector[bot]` 在本檔寫死於兩處：
#   1. respond-to-review job 的 job-level if
#   2. Detect repeated reviews step 內的 codexBotLogin 常數
# 如果 Codex 改 bot 名字，**兩處要同時更新**，缺一邊會讓 pipeline 半失靈。
# pipeline-troubleshooting.md §1 描述了從失靈症狀回頭修這兩處的流程。

on:
  issues:
    types: [labeled]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write  # 必填：Claude Code Action 即使用 OAuth token 也會嘗試取 OIDC token；缺這個 permission action 會在最開頭 die 在 OIDC 取不到

jobs:
  # ──────────────────────────────────────────────────────────
  # Trigger P：label 觸發 Claude 只做 issue 拆解，不改 code、不開 PR
  # ──────────────────────────────────────────────────────────
  plan-issue:
    if: github.event_name == 'issues' && github.event.label.name == 'agent:plan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          github_token: ${{ secrets.GH_USER_TOKEN }}
          bot_id: 267302701
          bot_name: shihchengwei-lab
          prompt: |
            You are the planning layer for this repo's agent pipeline.

            Process GitHub issue #${{ github.event.issue.number }} in planning-only mode.

            Rules:
            - Do not edit code.
            - Do not open a pull request.
            - Do not implement the requested change.
            - Read the issue title and body.
            - If the issue is too large for one Claude Action run, decompose it into 1-5 small executable child issues.
            - Each child issue must have: scope, non-goals, validation command, and acceptance criteria.
            - Label only the first executable child issue with agent:run.
            - Link all child issues back to the parent issue.
            - Comment on the parent issue with the execution order and child issue links.
            - Ask SHIHCHENG only if there is a true product or design decision that cannot be inferred.
          claude_args: |
            --max-turns 30
            --allowed-tools "Bash(gh:*),Read"

  # ──────────────────────────────────────────────────────────
  # Trigger A：label 觸發 Claude 處理 issue
  # ──────────────────────────────────────────────────────────
  process-issue:
    if: github.event_name == 'issues' && github.event.label.name == 'agent:run'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # debug: 看 Claude 實際呼叫了哪些 tool、哪些被拒（Phase 03a 第一次跑 8 turns 內 4 次 permission denial 的根因排查）
          show_full_output: true
          # X1-revised（Phase 03a debug）：用 SHIHCHENG 的 PAT 蓋掉 action 預設的 installation token
          # → PR opener 變 user → Codex 才會 auto-review。沒這個的話 Codex 完全跳過 bot-opened PR。
          github_token: ${{ secrets.GH_USER_TOKEN }}
          # X1：commit author/committer 也對齊 user identity，跟 PR opener 一致
          bot_id: 267302701
          bot_name: shihchengwei-lab
          prompt: |
            Process GitHub issue #${{ github.event.issue.number }}.

            First, read the issue title and body and assess task size.
            Decide whether the requested task fits within one approximately 30-turn Claude Action run.

            If the task is clearly too large or oversized for one run:
            - Do not edit code.
            - Do not open a pull request.
            - Decompose the work into 1-5 small child issues.
            - Label each child issue with agent:child.
            - Label only the first executable child issue with agent:run.
            - Link each child issue back to the parent issue.
            - Post a comment on the parent explaining that scope exceeded one run and listing the child issues.
            - Stop after creating the child issues and comment.

            If the task fits within one run:
            - Follow the governance in CLAUDE.md and the seven-column evidence-bound structure in docs/code-review.md.
            - Implement the requested change and open a pull request whose description uses that structure (at minimum: severity, evidence, suggested_validation).
          claude_args: |
            --max-turns 30
            --allowed-tools "Bash(git:*),Bash(gh:*),Edit,Write,Read"

  # ──────────────────────────────────────────────────────────
  # Trigger B：PR review 觸發 Claude 修正（限 Codex bot 身份）
  # ──────────────────────────────────────────────────────────
  respond-to-review:
    if: github.event_name == 'pull_request_review' && github.event.review.user.login == 'chatgpt-codex-connector[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      # 重複偵測（agent-pipeline-v3/01-install.md §B「重複偵測」）：
      #   同一 PR 上、來自 Codex bot 的 review，body 的 sha256 hash 累積 ≥ 3 次
      #   → 跳過 Claude 修正，改寫 refusal log + 加 agent:stuck label + 留 comment
      - name: Detect repeated reviews
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const crypto = require('crypto');
            const codexBotLogin = 'chatgpt-codex-connector[bot]';
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const hashes = {};
            for (const r of reviews) {
              if (r.user && r.user.login === codexBotLogin) {
                const h = crypto.createHash('sha256').update(r.body || '').digest('hex');
                hashes[h] = (hashes[h] || 0) + 1;
              }
            }
            const max = Object.values(hashes).reduce((a, b) => Math.max(a, b), 0);
            core.info(`Codex review hash counts: ${JSON.stringify(hashes)}`);
            core.setOutput('duplicate', max >= 3 ? 'true' : 'false');
            core.setOutput('max_count', String(max));

      # 觸發動作 1/3：append docs/refusal-log.jsonl 並 commit/push 進 PR branch
      # 排在 label/comment 前面：commit 失敗時不會留下「label 加了但 log 沒寫」的半完成狀態
      - name: Append refusal log
        if: steps.detect.outputs.duplicate == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs
          ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          branch="${{ github.event.pull_request.head.ref }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          pr_number="${{ github.event.pull_request.number }}"
          # JSONL 一行一條，schema 見 docs/refusal-log.md
          printf '{"timestamp":"%s","task_id":"%s","output_artifact":{"diff_hash":"%s","files":[]},"issue_signatures":[],"retry_count":3,"user_decision":null,"user_decision_notes":null,"resolved_at":null,"pr":%s}\n' \
            "$ts" "$branch" "$head_sha" "$pr_number" >> docs/refusal-log.jsonl
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/refusal-log.jsonl
          git commit -m "log refusal: repeated review hash on PR #${pr_number}"
          git push origin HEAD:${branch}

      # 觸發動作 2/3 + 3/3：加 agent:stuck label + 留 comment
      - name: Apply agent:stuck label and post comment
        if: steps.detect.outputs.duplicate == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['agent:stuck'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: 'Cold-eyes refusal logged — recovery step will inspect the stuck state and either create a recovery issue or ask one narrow question.',
            });

      # 觸發動作 4/4：重複 review 後不再只等待人工裁決，而是嘗試建立 recovery issue
      - name: Run Claude recovery step
        if: steps.detect.outputs.duplicate == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          github_token: ${{ secrets.GH_USER_TOKEN }}
          bot_id: 267302701
          bot_name: shihchengwei-lab
          allowed_bots: chatgpt-codex-connector
          prompt: |
            You are recovering from a failed or stuck agent run on PR #${{ github.event.pull_request.number }}.

            Do not repeat the same failed action.
            Do not edit code.
            Do not push commits to the PR branch.
            Do not open a pull request.

            Recovery task:
            1. Read the PR title, body, and latest relevant Codex review comments.
            2. Summarize what happened and what work remains.
            3. If the remaining work is clear, small, and actionable, create exactly one recovery issue.
               - Label it agent:run and agent:child.
               - Link it back to PR #${{ github.event.pull_request.number }}.
               - Include scope, non-goals, validation command, and acceptance criteria.
               - Comment on the PR with the recovery issue link.
            4. If the remaining work requires a real human product/design/governance decision, do not create a recovery issue.
               - Label PR #${{ github.event.pull_request.number }} with agent:needs-user-decision.
               - Post exactly one narrow question on the PR.

            Create at most one recovery issue for this stuck event.
          claude_args: |
            --max-turns 20
            --allowed-tools "Bash(gh:*),Read"

      # 沒重複 → 真的呼叫 Claude 修正
      - name: Run Claude Code Action
        if: steps.detect.outputs.duplicate != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # debug: 跟 process-issue job 同樣理由——暴露 tool calls/denials 方便排查
          show_full_output: true
          # X1-revised：跟 process-issue job 同樣理由——commits/PR 動作都用 SHIHCHENG identity
          github_token: ${{ secrets.GH_USER_TOKEN }}
          bot_id: 267302701
          bot_name: shihchengwei-lab
          # 必填：pull_request_review event 的 actor 是 reviewer（Codex bot），
          # action 預設拒絕 bot actor、必須白名單。我們只允許 Codex Cloud 的 bot 帳號。
          # 注意：actor 名格式無 [bot] 後綴（不同於 review.user.login，那個有後綴）。
          # 從 PR #15 的失敗 log 確認：actor 是 chatgpt-codex-connector（無後綴）。
          allowed_bots: chatgpt-codex-connector
          prompt: |
            A reviewer has submitted a review on PR #${{ github.event.pull_request.number }}.
            Read the latest review and apply the requested fix to this PR's branch.
            Stay narrowly within the scope of the review—do not refactor or expand
            beyond fixing the issue raised. Commit and push the fix.
          claude_args: |
            --max-turns 30
            --allowed-tools "Bash(git:*),Bash(gh:*),Edit,Write,Read"
